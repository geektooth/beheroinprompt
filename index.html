<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ─── Reset ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }

/* ─── Background ─────────────────────────────────────────────────── */
body {
  min-height: 100vh;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  color: #e8e8f0;
  background: #060612;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,57,210,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(29,120,210,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 40%, rgba(180,60,255,0.10) 0%, transparent 50%);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ─── Noise grain overlay ────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ─── Layout ─────────────────────────────────────────────────────── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 80px;
}

/* ─── Header ─────────────────────────────────────────────────────── */
header {
  text-align: center;
  margin-bottom: 52px;
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #a78bfa, #60a5fa);
  border-radius: 14px;
  font-size: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 30px rgba(139,92,246,0.4);
}

header h1 {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: -1.5px;
  line-height: 1.1;
  background: linear-gradient(135deg, #ffffff 30%, #a78bfa 70%, #60a5fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

header p {
  font-size: 15px;
  color: rgba(200,200,230,0.55);
  font-weight: 400;
  letter-spacing: 0.1px;
}

/* ─── Glass card ─────────────────────────────────────────────────── */
.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px) saturate(150%);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* ─── Main card ──────────────────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 720px;
  padding: 36px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ─── Field ──────────────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 10px; }

.field-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(167,139,250,0.8);
}

/* ─── Textarea ───────────────────────────────────────────────────── */
textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  color: #e8e8f0;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 400;
  line-height: 1.65;
  padding: 16px 18px;
  resize: none;
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
  min-height: 120px;
}

textarea::placeholder { color: rgba(180,180,220,0.28); }

textarea:focus {
  border-color: rgba(139,92,246,0.5);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.12), 0 0 20px rgba(139,92,246,0.08);
}

/* ─── Mode selector ──────────────────────────────────────────────── */
.modes {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.mode-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  color: rgba(200,200,230,0.5);
  cursor: pointer;
  transition: all .2s;
  font-family: 'Inter', sans-serif;
  text-align: center;
}

.mode-btn:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(139,92,246,0.3);
  color: rgba(220,220,245,0.8);
}

.mode-btn.active {
  background: rgba(139,92,246,0.15);
  border-color: rgba(139,92,246,0.5);
  color: #c4b5fd;
  box-shadow: 0 0 20px rgba(139,92,246,0.12);
}

.mode-icon { font-size: 22px; line-height: 1; }
.mode-name { font-size: 11.5px; font-weight: 600; letter-spacing: 0.2px; }
.mode-desc { font-size: 10px; color: rgba(180,180,220,0.4); line-height: 1.3; }
.mode-btn.active .mode-desc { color: rgba(196,181,253,0.6); }

/* ─── Context row (optional) ─────────────────────────────────────── */
.context-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

input[type="text"] {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  color: #e8e8f0;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 12px 15px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}

input[type="text"]::placeholder { color: rgba(180,180,220,0.28); }

input[type="text"]:focus {
  border-color: rgba(139,92,246,0.5);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.10);
}

/* ─── Generate button ────────────────────────────────────────────── */
.gen-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.1px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all .2s;
  box-shadow: 0 4px 20px rgba(109,40,217,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}

.gen-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
  border-radius: inherit;
}

.gen-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 30px rgba(109,40,217,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
}

.gen-btn:active { transform: translateY(0); }

.gen-btn .hint {
  margin-left: auto;
  font-size: 11px;
  opacity: 0.5;
  font-weight: 400;
}

/* ─── Output card ────────────────────────────────────────────────── */
.out-card {
  width: 100%;
  max-width: 720px;
  display: none;
  flex-direction: column;
  gap: 0;
  animation: slideUp .35s cubic-bezier(.4,0,.2,1);
}

.out-card.visible { display: flex; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Output header bar */
.out-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.2);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  gap: 12px;
}

.out-bar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.out-dot {
  width: 8px; height: 8px;
  border-radius: 99px;
  background: #a78bfa;
  box-shadow: 0 0 8px rgba(167,139,250,0.6);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.out-title {
  font-size: 12px;
  font-weight: 600;
  color: rgba(167,139,250,0.9);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.out-meta {
  font-size: 11px;
  color: rgba(180,180,220,0.35);
}

.out-actions { display: flex; gap: 8px; }

.icon-btn {
  padding: 6px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: rgba(200,200,230,0.6);
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all .15s;
}

.icon-btn:hover { background: rgba(255,255,255,0.09); color: #e8e8f0; }
.icon-btn.ok { border-color: rgba(52,211,153,0.4); color: #34d399; }

/* Output textarea */
#prompt-out {
  width: 100%;
  min-height: 380px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.07);
  border-top: none;
  border-bottom: none;
  color: #d4d4f0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.85;
  padding: 22px 24px;
  resize: none;
  outline: none;
}

/* Quality footer */
.out-footer {
  padding: 12px 20px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.07);
  border-top: 1px solid rgba(255,255,255,0.05);
  border-radius: 0 0 20px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.quality-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.q-label { font-size: 11px; color: rgba(180,180,220,0.4); white-space: nowrap; }

.q-track {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  overflow: hidden;
  max-width: 120px;
}

.q-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  transition: width .6s cubic-bezier(.4,0,.2,1);
  width: 0%;
}

.q-score { font-size: 12px; font-weight: 600; color: #a78bfa; }
.word-count { font-size: 11px; color: rgba(180,180,220,0.3); margin-left: auto; }

/* ─── Tips ───────────────────────────────────────────────────────── */
.tips-wrap {
  width: 100%;
  max-width: 720px;
  display: none;
  gap: 8px;
  flex-wrap: wrap;
}

.tips-wrap.visible { display: flex; }

.tip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 13px;
  background: rgba(251,191,36,0.05);
  border: 1px solid rgba(251,191,36,0.12);
  border-radius: 8px;
  font-size: 11.5px;
  color: rgba(251,191,36,0.65);
}

.tip::before { content: '→'; opacity: 0.6; }

/* ─── Scrollbar ──────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 99px; }

/* ─── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 600px) {
  header h1 { font-size: 30px; }
  .card { padding: 22px; gap: 22px; }
  .modes { grid-template-columns: repeat(2, 1fr); }
  .context-row { grid-template-columns: 1fr; }
  .gen-btn .hint { display: none; }
}
</style>
</head>

<body>
<div class="page">

  <!-- Header -->
  <header>
    <div class="logo-mark">⚡</div>
    <h1>Prompt Forge</h1>
    <p>Turn a rough idea into a precision-engineered prompt</p>
  </header>

  <!-- Input card -->
  <div class="glass card">

    <!-- Task -->
    <div class="field">
      <div class="field-label">What do you need?</div>
      <textarea id="task" rows="4"
        placeholder="Describe your goal in plain English. Be as specific or vague as you like — the generator will fill in the gaps.&#10;&#10;e.g. Write a cold email to a fintech founder about our API"></textarea>
    </div>

    <!-- Mode -->
    <div class="field">
      <div class="field-label">Mode</div>
      <div class="modes">
        <button class="mode-btn active" data-mode="general" onclick="setMode(this)">
          <div class="mode-icon">✦</div>
          <div class="mode-name">General</div>
          <div class="mode-desc">Any task, balanced approach</div>
        </button>
        <button class="mode-btn" data-mode="analytical" onclick="setMode(this)">
          <div class="mode-icon">◎</div>
          <div class="mode-name">Analytical</div>
          <div class="mode-desc">Data, reasoning, research</div>
        </button>
        <button class="mode-btn" data-mode="creative" onclick="setMode(this)">
          <div class="mode-icon">◈</div>
          <div class="mode-name">Creative</div>
          <div class="mode-desc">Writing, ideas, storytelling</div>
        </button>
        <button class="mode-btn" data-mode="technical" onclick="setMode(this)">
          <div class="mode-icon">⬡</div>
          <div class="mode-name">Technical</div>
          <div class="mode-desc">Code, systems, engineering</div>
        </button>
      </div>
    </div>

    <!-- Context -->
    <div class="field">
      <div class="field-label">Context <span style="opacity:.4;font-weight:400;text-transform:none;letter-spacing:0">— optional</span></div>
      <div class="context-row">
        <input type="text" id="audience" placeholder="Who is the audience?" />
        <input type="text" id="constraints" placeholder="Any constraints or rules?" />
      </div>
    </div>

    <!-- Generate -->
    <button class="gen-btn" onclick="generate()">
      Generate Prompt
      <span class="hint">⌘ Enter</span>
    </button>

  </div>

  <div style="height:24px;"></div>

  <!-- Output -->
  <div class="out-card glass" id="out-card">
    <div class="out-bar">
      <div class="out-bar-left">
        <div class="out-dot"></div>
        <div class="out-title">Generated Prompt</div>
        <div class="out-meta" id="out-mode-label"></div>
      </div>
      <div class="out-actions">
        <button class="icon-btn" id="copy-btn" onclick="copyOut()">Copy</button>
        <button class="icon-btn" onclick="resetOut()">Clear</button>
      </div>
    </div>
    <textarea id="prompt-out" readonly></textarea>
    <div class="out-footer">
      <div class="quality-wrap">
        <span class="q-label">Quality</span>
        <div class="q-track"><div class="q-fill" id="q-fill"></div></div>
        <span class="q-score" id="q-score"></span>
      </div>
      <span class="word-count" id="word-count"></span>
    </div>
  </div>

  <div style="height:12px;"></div>
  <div class="tips-wrap" id="tips-wrap"></div>

</div>

<script>
let mode = 'general';

function setMode(el) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  mode = el.dataset.mode;
}

const modeConfig = {
  general: {
    label: 'General Mode',
    tone: 'clear, balanced, and direct',
    format: 'structured prose with clearly defined sections',
    approach: 'comprehensive and well-reasoned',
    persona: 'a highly capable, broadly knowledgeable expert',
    cot: 'Analyze the request from multiple angles before committing to an approach.',
    quality: ['Accuracy and completeness', 'Clear structure', 'Actionable output', 'Appropriate length']
  },
  analytical: {
    label: 'Analytical Mode',
    tone: 'precise, evidence-based, and systematic',
    format: 'structured analysis with clearly labeled sections, data references where relevant, and logical progression',
    approach: 'methodical and thorough, with explicit reasoning chains',
    persona: 'a senior analyst with deep expertise in data interpretation, critical thinking, and structured problem-solving',
    cot: 'Break the problem into components. Evaluate each independently before synthesizing a conclusion. Cite your reasoning explicitly.',
    quality: ['Logical coherence', 'Evidence-based claims', 'No unsupported assertions', 'Quantified where possible', 'Clear methodology']
  },
  creative: {
    label: 'Creative Mode',
    tone: 'vivid, engaging, and original',
    format: 'flowing, expressive prose that prioritizes impact over formality',
    approach: 'imaginative and distinctive, prioritizing resonance and originality over convention',
    persona: 'an award-winning creative professional with a sharp eye for what makes content memorable and emotionally resonant',
    cot: 'Before writing, identify the emotional core of the request. What feeling should the reader leave with? What is the single most original angle?',
    quality: ['Originality', 'Emotional resonance', 'Vivid specificity', 'Strong opening', 'Memorable conclusion']
  },
  technical: {
    label: 'Technical Mode',
    tone: 'precise, unambiguous, and technically rigorous',
    format: 'technical documentation style — clear headings, code blocks where appropriate, explicit definitions, numbered steps for procedures',
    approach: 'engineering-grade precision with no hand-waving or vagueness',
    persona: 'a senior engineer with 15+ years of experience who values correctness, maintainability, and clarity above all',
    cot: 'Identify edge cases, failure modes, and assumptions before proposing solutions. Prefer explicit over implicit. Flag anything that is uncertain.',
    quality: ['Technical accuracy', 'Edge cases addressed', 'No ambiguity', 'Reproducible steps', 'Correct terminology']
  }
};

function buildPrompt(task, audience, constraints, m) {
  const cfg = modeConfig[m];
  const audienceLine = audience
    ? `The output is intended for: ${audience}.`
    : 'The output is intended for a general professional audience.';
  const constraintBlock = constraints
    ? `\n<constraints>\n${constraints}\n\nAdditionally:\n- Do not pad the response with filler or unnecessary hedging\n- Be specific — avoid vague generalities\n- If anything is ambiguous, state your assumption explicitly rather than guessing silently\n</constraints>`
    : `\n<constraints>\n- Do not pad the response with filler or unnecessary hedging\n- Be specific — avoid vague generalities\n- If anything is ambiguous, state your assumption explicitly rather than guessing silently\n</constraints>`;

  return `<role>
You are ${cfg.persona}. Your communication style is ${cfg.tone}. You hold yourself to extremely high standards and never produce generic, surface-level output.
</role>

<task>
${task}
</task>

<context>
${audienceLine}
Approach this task in a way that is ${cfg.approach}.
</context>${constraintBlock}

<instructions>
Before writing your response, reason through the following inside <thinking> tags:

1. UNDERSTAND: What exactly is being asked? Restate it in your own words and identify the core deliverable.
2. SCOPE: What should be included? What should be left out? Where are the boundaries of this task?
3. APPROACH: What is the best structure or methodology for this specific request? Consider at least two approaches and choose the strongest.
4. EDGE CASES: What could go wrong, be misunderstood, or need clarification? Address any you can; flag the rest.
5. QUALITY BAR: What would make this response exceptional rather than merely adequate?

Then deliver your final response after the thinking block. Do not reference your thinking in the final answer.
</instructions>

<output_format>
Format your response as ${cfg.format}.

${audienceLine}

Quality criteria for your response:
${cfg.quality.map((q, i) => `${i + 1}. ${q}`).join('\n')}

${cfg.cot}
</output_format>`;
}

function calcQuality(task, audience, constraints, m) {
  let score = 40;
  if (task.length > 40)  score += 15;
  if (task.length > 100) score += 10;
  if (audience)          score += 15;
  if (constraints)       score += 15;
  if (m !== 'general')   score += 5;
  return Math.min(score, 100);
}

function buildTips(task, audience, constraints) {
  const tips = [];
  if (task.length < 40) tips.push('Add more detail to your task — specificity always improves output');
  if (!audience)        tips.push('Specify an audience for better-calibrated tone and depth');
  if (!constraints)     tips.push('Add constraints (length, style, format) to sharpen the output');
  return tips;
}

function generate() {
  const task = document.getElementById('task').value.trim();
  if (!task) {
    const ta = document.getElementById('task');
    ta.style.borderColor = 'rgba(239,68,68,0.5)';
    ta.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.10)';
    ta.focus();
    setTimeout(() => { ta.style.borderColor = ''; ta.style.boxShadow = ''; }, 1800);
    return;
  }
  const audience    = document.getElementById('audience').value.trim();
  const constraints = document.getElementById('constraints').value.trim();
  const prompt      = buildPrompt(task, audience, constraints, mode);
  const words       = prompt.trim().split(/\s+/).length;
  const quality     = calcQuality(task, audience, constraints, mode);
  const tips        = buildTips(task, audience, constraints);

  document.getElementById('prompt-out').value = prompt;
  document.getElementById('out-mode-label').textContent = modeConfig[mode].label;
  document.getElementById('word-count').textContent = `${words} words`;

  const card = document.getElementById('out-card');
  card.classList.add('visible');

  setTimeout(() => {
    document.getElementById('q-fill').style.width = quality + '%';
    document.getElementById('q-score').textContent = quality + '%';
  }, 60);

  const tw = document.getElementById('tips-wrap');
  if (tips.length) {
    tw.classList.add('visible');
    tw.innerHTML = tips.map(t => `<div class="tip">${t}</div>`).join('');
  } else {
    tw.classList.remove('visible');
    tw.innerHTML = '';
  }

  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function copyOut() {
  const val = document.getElementById('prompt-out').value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2000);
  });
}

function resetOut() {
  document.getElementById('out-card').classList.remove('visible');
  document.getElementById('prompt-out').value = '';
  document.getElementById('q-fill').style.width = '0%';
  document.getElementById('q-score').textContent = '';
  document.getElementById('tips-wrap').classList.remove('visible');
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generate();
});
</script>
</body>
</html>
